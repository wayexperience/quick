# oauth2-proxy: gate SSO Google. Solo config STATICA qui; tutto ciò che dipende
# dal dominio o dai segreti arriva da variabili d'ambiente OAUTH2_PROXY_* (vedi
# docker-compose.yml): CLIENT_ID, CLIENT_SECRET, COOKIE_SECRET, EMAIL_DOMAINS,
# REDIRECT_URL, COOKIE_DOMAINS, WHITELIST_DOMAINS.

http_address = "0.0.0.0:4180"
reverse_proxy = true

provider = "google"

cookie_secure   = true
cookie_samesite = "lax"

set_xauthrequest     = true
skip_provider_button = true

# In forward_auth non si fa proxy di un upstream reale: basta una risposta statica.
upstreams = ["static://202"]
